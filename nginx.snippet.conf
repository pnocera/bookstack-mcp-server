# ─────────────────────────────────────────────────────────────────────────────
# nginx vhost for the BookStack MCP Remote Server
#
# Add this as a new server block in your nginx config (e.g. as a separate file
# in /etc/nginx/conf.d/mcp-bookstack.conf or inside your sites-enabled dir).
#
# Prerequisites:
#   - SSL certificate for mcp-bookstack.01640.link
#     (e.g. Let's Encrypt: certbot --nginx -d mcp-bookstack.01640.link)
#   - bookstack-mcp container running and bound to 127.0.0.1:3100
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name mcp-bookstack.01640.link;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name mcp-bookstack.01640.link;

    # ── SSL ──────────────────────────────────────────────────────────────────
    # Replace with your actual cert paths (Let's Encrypt example below):
    ssl_certificate     /etc/letsencrypt/live/mcp-bookstack.01640.link/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp-bookstack.01640.link/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Proxy to MCP container ────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;

        # Required for Server-Sent Events (SSE) / Streamable HTTP
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable buffering so SSE events are streamed immediately
        proxy_buffering    off;
        proxy_cache        off;

        # Allow long-lived connections (OAuth flows + MCP sessions)
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }
}
